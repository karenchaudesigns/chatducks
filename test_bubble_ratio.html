<!DOCTYPE html>
<html>
<style>
body { background: #333; display: flex; align-items: flex-end; justify-content: center; height: 100vh; margin: 0; }
.duck-wrapper {
    position: relative;
    width: 80px;
}
.duck-swim {
    display: flex;
    flex-direction: column;
    align-items: center;
}
.bubble-container {
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px; /* Uniform distance */
    z-index: 10;
    margin-bottom: 15px; /* space for tail */
}
.speech-bubble {
    position: relative;
    background: white;
    color: #111827;
    padding: 4px 8px; /* decreased padding */
    border-radius: 12px;
    font-family: 'Roboto Condensed', sans-serif;
    font-size: 14px;
    font-weight: 700;
    max-width: 200px;
    word-wrap: break-word;
    text-align: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    border: 3px solid #111827;
    /* Aspect ratio close to 16:9 */
    aspect-ratio: 16 / 9;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Tail pointing down from center */
.speech-bubble:last-child::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%);
    border-width: 8px 8px 0;
    border-style: solid;
    border-color: white transparent transparent transparent;
    display: block;
    width: 0;
    z-index: 2;
}

.speech-bubble:last-child::before {
    content: '';
    position: absolute;
    bottom: -12px;
    left: 50%;
    transform: translateX(-50%);
    border-width: 11px 11px 0;
    border-style: solid;
    border-color: #111827 transparent transparent transparent;
    display: block;
    width: 0;
    z-index: 1;
}

.emote {
    height: 2em; /* 2x text size */
    vertical-align: middle;
}
</style>
<body>
    <div class="duck-wrapper">
        <div class="duck-swim">
            <div class="bubble-container">
                <div class="speech-bubble">First msg</div>
                <div class="speech-bubble">Second msg <img class="emote" src="assets/custom_ducks/lurkyduck.png"></div>
                <div class="speech-bubble">Third msg is max len limit to 44c</div>
            </div>
            <div style="width: 80px; height: 80px; background: yellow;">DUCK</div>
        </div>
    </div>
</body>
</html>
